<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta
      name="description"
      content="Quick links for The Patio in Hartford: home, menu and order status."
    />
    <meta name="robots" content="noindex,follow,noarchive" />
    <meta name="theme-color" content="#07130d" />
    <title>The Patio | Quick Links</title>
    <link rel="icon" href="assets/logo-400.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --forest: #07130d;
        --forest-soft: #123521;
        --green: #10aa57;
        --green-dark: #0b8747;
        --yellow: #ffd22f;
        --cream: #f7f5ef;
        --ink: #17211a;
        --muted: #68736b;
        --line: rgba(23, 33, 26, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        padding: clamp(14px, 4vw, 28px);
        display: grid;
        place-items: center;
        overflow-x: hidden;
        color: var(--ink);
        background: var(--forest);
        font-family: "Inter", Arial, sans-serif;
      }

      body::before {
        content: "";
        position: fixed;
        z-index: 0;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(7, 19, 13, 0.68), rgba(7, 19, 13, 0.9)),
          url("assets/images/patio-front-upright-960.webp") center 54% / cover;
        filter: saturate(0.86);
      }

      .quick-frame {
        position: relative;
        z-index: 1;
        width: min(100%, 420px);
        padding: clamp(20px, 5vw, 30px);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 22px;
        background: rgba(247, 245, 239, 0.97);
        box-shadow: 0 26px 80px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      .logo-frame {
        width: 128px;
        min-height: 104px;
        margin: 0 auto 17px;
        padding: 12px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 17px;
        background: linear-gradient(145deg, var(--forest-soft), var(--forest));
        box-shadow:
          0 16px 34px rgba(7, 19, 13, 0.28),
          inset 0 1px rgba(255, 255, 255, 0.07);
      }

      .logo-frame img {
        width: 112px;
        height: auto;
        display: block;
        filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.35));
      }

      h1 {
        margin: 0;
        font: 800 clamp(30px, 9vw, 42px) / 1 "Sora", "Inter", sans-serif;
        letter-spacing: -0.045em;
      }

      .subtitle {
        margin: 8px 0 23px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .quick-links {
        display: grid;
        gap: 10px;
      }

      .quick-link {
        min-height: 54px;
        padding: 12px 15px;
        display: grid;
        grid-template-columns: 36px 1fr;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 11px;
        color: var(--ink);
        background: #fff;
        box-shadow: 0 9px 22px rgba(7, 19, 13, 0.07);
        text-decoration: none;
        font-size: 13px;
        font-weight: 800;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          box-shadow 160ms ease;
      }

      .quick-link::before {
        content: none;
      }

      .quick-link::after {
        content: none;
      }

      .link-icon {
        width: 32px;
        height: 32px;
        padding: 7px;
        display: block;
        border-radius: 7px;
        color: var(--forest);
        background: #eef2ec;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .link-label {
        padding-right: 32px;
        text-align: center;
      }

      .quick-link.primary {
        color: #fff;
        border-color: var(--green);
        background: linear-gradient(180deg, #12b75e, var(--green));
        box-shadow: 0 12px 26px rgba(16, 170, 87, 0.24);
      }

      .quick-link.primary .link-icon {
        color: var(--forest);
        background: var(--yellow);
      }

      .quick-link:hover {
        transform: translateY(-2px);
        border-color: rgba(7, 19, 13, 0.25);
        box-shadow: 0 13px 28px rgba(7, 19, 13, 0.12);
      }

      .quick-link.primary:hover {
        border-color: var(--green-dark);
        background: var(--green-dark);
      }

      .quick-link.booking {
        color: #fff;
        border-color: var(--forest);
        background: var(--forest);
      }

      .quick-link.booking .link-icon {
        color: var(--forest);
        background: var(--yellow);
      }

      .quick-link.booking:hover {
        border-color: var(--forest-soft);
        background: var(--forest-soft);
      }

      .quick-link:focus-visible,
      .powered-by a:focus-visible {
        outline: 3px solid var(--yellow);
        outline-offset: 3px;
      }

      .frame-footer {
        margin-top: 22px;
        padding-top: 17px;
        border-top: 1px solid var(--line);
      }

      .location {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
      }

      .powered-by {
        margin: 0;
        color: #7a837c;
        font-size: 10px;
        letter-spacing: 0.04em;
        line-height: 1.5;
      }

      .powered-by a {
        display: inline;
        color: #176b3d;
        font-weight: 800;
        text-decoration: none;
      }

      .powered-by a:hover {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      @media (max-height: 650px) {
        body {
          align-items: start;
          padding: 9px;
        }

        .quick-frame {
          padding: 15px 17px;
          border-radius: 17px;
        }

        .logo-frame {
          width: 102px;
          min-height: 78px;
          margin-bottom: 10px;
          padding: 8px;
        }

        .logo-frame img {
          width: 88px;
        }

        h1 {
          font-size: 28px;
        }

        .subtitle {
          margin: 5px 0 13px;
          font-size: 11px;
        }

        .quick-link {
          min-height: 48px;
        }

        .frame-footer {
          margin-top: 13px;
          padding-top: 11px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .quick-link {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="quick-frame">
      <div class="logo-frame">
        <img
          src="assets/logo-400.webp"
          width="400"
          height="280"
          alt="The Patio"
        />
      </div>

      <h1>The Patio</h1>
      <p class="subtitle">Drinks, events and good nights in Hartford.</p>

      <nav class="quick-links" aria-label="The Patio quick links">
        <a class="quick-link home" href="index.html">
          <svg class="link-icon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="M3 11.5 12 4l9 7.5" />
            <path d="M5.5 10.5V20h13v-9.5M9.5 20v-6h5v6" />
          </svg>
          <span class="link-label">Home</span>
        </a>
        <a class="quick-link menu primary" href="menu.html">
          <svg class="link-icon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="M5 4h14l-7 8Z" />
            <path d="M12 12v7M8.5 20h7" />
            <path d="m15.8 7 2.6-3" />
          </svg>
          <span class="link-label">View Menu &amp; Order</span>
        </a>
        <a class="quick-link status" href="order-status.html">
          <svg class="link-icon" aria-hidden="true" viewBox="0 0 24 24">
            <path d="M6 3h12v18l-3-2-3 2-3-2-3 2Z" />
            <path d="M9 8h6M9 12h6M9 16h3" />
          </svg>
          <span class="link-label">Check Order Status</span>
        </a>
        <a
          class="quick-link booking"
          href="https://www.appispot.com/spots/6a08ed10f08b17390d4f09ad"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg class="link-icon" aria-hidden="true" viewBox="0 0 24 24">
            <rect x="3" y="5" width="18" height="16" rx="2" />
            <path d="M8 3v4M16 3v4M3 10h18" />
            <path d="m9 15 2 2 4-4" />
          </svg>
          <span class="link-label">Book This Spot</span>
        </a>
      </nav>

      <footer class="frame-footer">
        <p class="location">Main Street · Hartford, Connecticut</p>
        <p class="powered-by">
          Powered by
          <a
            href="https://www.reimagebs.com"
            target="_blank"
            rel="noopener noreferrer"
            >REIMAGE BUSINESS SOLUTIONS</a
          >
        </p>
      </footer>
    </main>
  </body>
</html>
